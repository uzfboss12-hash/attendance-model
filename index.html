<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QIU Smart Attendance System</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}
h1{text-align:center;}
.subtitle{text-align:center;color:#cbd5e1;}
.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:20px 0;
}
button{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-size:16px;
}
.start-btn{background:#22c55e;}
.stop-btn{background:#ef4444;}
.bluetooth-btn{background:#3b82f6;}
.video-section{
    display:flex;
    justify-content:center;
}
canvas{
    border-radius:20px;
    border:4px solid #38bdf8;
}
.status-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:25px;
}
.card{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
}
.log{
    max-height:200px;
    overflow-y:auto;
}
.success{color:#4ade80;}
.fail{color:#f87171;}
.warning{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<h1>QIU Smart Attendance System</h1>
<p class="subtitle">Bluetooth + Facial Recognition Attendance Verification</p>

<div class="controls">
<button class="start-btn" onclick="startSystem()">Start Camera</button>
<button class="stop-btn" onclick="stopSystem()">Stop Camera</button>
<button class="bluetooth-btn" onclick="connectBluetooth()">Connect Bluetooth</button>
</div>

<div class="video-section">
<div id="webcam-container"></div>
</div>

<div class="status-grid">

<div class="card">
<h3>Face Recognition Status</h3>
<div id="faceStatus" class="warning">Waiting...</div>
</div>

<div class="card">
<h3>Bluetooth Status</h3>
<div id="bluetoothStatus" class="warning">Not Connected</div>
</div>

<div class="card">
<h3>Attendance Result</h3>
<div id="attendanceStatus" class="warning">Attendance Pending</div>
</div>

<div class="card">
<h3>Attendance Logs</h3>
<div class="log" id="logs"></div>
</div>

</div>
</div>

<script>

const URL = "./model/";

let model, webcam;
let bluetoothConnected = false;
let systemStarted = false;
let animationId = null;

async function loadModel(){
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";
    model = await tmImage.load(modelURL, metadataURL);
}

async function startSystem(){

    if(systemStarted){
        alert("Camera already running!");
        return;
    }

    systemStarted = true;

    await loadModel();

    webcam = new tmImage.Webcam(450,450,true);

    await webcam.setup();
    await webcam.play();

    const container = document.getElementById("webcam-container");
    container.innerHTML = "";

    container.appendChild(webcam.canvas);

    loop();
}

async function stopSystem(){

    if(webcam){
        webcam.stop();
    }

    cancelAnimationFrame(animationId);

    document.getElementById("webcam-container").innerHTML = "";

    systemStarted = false;
}

async function loop(){

    webcam.update();

    await predict();

    animationId = requestAnimationFrame(loop);
}

async function predict(){

    const prediction = await model.predict(webcam.canvas);

    let best = prediction[0];

    for(let i=1;i<prediction.length;i++){
        if(prediction[i].probability > best.probability){
            best = prediction[i];
        }
    }

    const confidence = (best.probability*100).toFixed(2);

    if(best.probability > 0.90){

        document.getElementById("faceStatus").innerHTML =
        `<span class='success'>Recognized: ${best.className} (${confidence}%)</span>`;

        checkAttendance(best.className);

    } else {

        document.getElementById("faceStatus").innerHTML =
        `<span class='fail'>Face Not Recognized</span>`;
    }
}

async function connectBluetooth(){

    try{

        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices:true,
            optionalServices:['battery_service']
        });

        bluetoothConnected = true;

        document.getElementById("bluetoothStatus").innerHTML =
        `<span class='success'>Connected: ${device.name || "Bluetooth Device"}</span>`;

        addLog("Bluetooth connected.");

    } catch(error){

        bluetoothConnected = false;

        document.getElementById("bluetoothStatus").innerHTML =
        `<span class='fail'>Bluetooth connection failed</span>`;
    }
}

function checkAttendance(studentName){

    if(bluetoothConnected){

        document.getElementById("attendanceStatus").innerHTML =
        `<span class='success'>Attendance Recorded for ${studentName}</span>`;

        addLog(`Attendance recorded for ${studentName}`);

    } else {

        document.getElementById("attendanceStatus").innerHTML =
        `<span class='warning'>Bluetooth not connected</span>`;
    }
}

function addLog(message){

    const logs = document.getElementById("logs");

    const time = new Date().toLocaleTimeString();

    logs.innerHTML = `<div>[${time}] ${message}</div>` + logs.innerHTML;
}

</script>
</body>
</html>
